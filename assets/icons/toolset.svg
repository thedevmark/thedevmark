<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="DM Toolset">
  <!--
    DM Toolset brand mark — dark rounded square + lowercase "dm" + green
    pulse dot. 80x80 viewBox with 8px transparent padding so the rounded
    square breathes when composited (browser tabs, apple-touch-icon,
    Stripe Checkout, OG previews).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171a20"/>
      <stop offset="100%" stop-color="#0c0f15"/>
    </linearGradient>
    <radialGradient id="dot-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#57c98a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#57c98a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(8 8)">
    <rect width="64" height="64" rx="14" fill="url(#bg)"/>
    <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="rgba(255,255,255,0.05)"/>

    <text x="32" y="44"
          font-family="ui-sans-serif, Inter, -apple-system, 'Segoe UI', sans-serif"
          font-size="34" font-weight="800" fill="#f1f3f5"
          text-anchor="middle" letter-spacing="-1.5">dm</text>

    <circle cx="50" cy="14" r="9" fill="url(#dot-glow)"/>
    <circle cx="50" cy="14" r="4.5" fill="#57c98a"/>
  </g>
</svg>

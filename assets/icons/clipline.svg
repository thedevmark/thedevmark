      <stop offset="0" stop-color="#162334"/>
      <stop offset="1" stop-color="#0D1521"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BD5E5"/>
      <stop offset="1" stop-color="#3FA9BD"/>

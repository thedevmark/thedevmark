      <stop offset="1" stop-color="#CBD6E1"/>
    </linearGradient>
    <linearGradient id="glassPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#E8D6FF" stop-opacity="0.85"/>
      <stop offset="0.18" stop-color="#B07BFF" stop-opacity="0.78"/>
      <stop offset="0.62" stop-color="#7C3AED" stop-opacity="0.78"/>
      <stop offset="1"    stop-color="#4C1D95" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="glassSpec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1"    stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="leftHalf">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    Favicon: two interlocking gradient rings, matches /logo.svg mark.
    Square 32x32 viewBox. Stroke 4 (so at 16x16 render it's ~2 real
    pixels — still clearly legible). Same weave trick as logo:
    draw purple full, teal full, then re-draw a small purple arc
    over the TOP intersection so the rings appear linked.
  -->

  <defs>
    <linearGradient id="fav-purple" x1="0" y1="6" x2="0" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="fav-teal" x1="0" y1="6" x2="0" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke-width="4">
    <circle cx="11" cy="16" r="8" stroke="url(#fav-purple)"/>
    <circle cx="21" cy="16" r="8" stroke="url(#fav-teal)"/>
    <!-- Weave: arc of ring 1 over the top intersection (~(16, 9.76)) -->
    <path d="M 14.25 8.69 A 8 8 0 0 1 17.47 11.30" stroke="url(#fav-purple)"/>
  </g>
</svg>

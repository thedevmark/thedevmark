<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Film Lab">
  <!--
    Film Lab brand mark — a single 35mm frame lit gold.

    The mark is the film itself: a dark chip, a row of perforations top and
    bottom, and a gold exposed window that nearly spans the strip — thin
    borders, the way real film sits. No outer container; the chip is the whole
    icon, on transparent.

    The window glows warm gold: the icon is the product's own output. The
    red-orange bloom around it is halation, rendered the way the pipeline
    renders it (blur the highlight, subtract it back out, keep what escaped). It
    runs red because long wavelengths scatter furthest, which is why real
    halation is red.

    Raster assets are generated from this geometry by tools/make_icon.py.
  -->
  <defs>
    <linearGradient id="goldFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD383"/>
      <stop offset="55%"  stop-color="#FFB547"/>
      <stop offset="100%" stop-color="#E8891C"/>
    </linearGradient>

    <!-- Halation: blur the frame, keep only the light that escaped its edge. -->
    <filter id="halation" x="-25%" y="-40%" width="150%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="26" result="bloom"/>
      <feComposite in="bloom" in2="SourceAlpha" operator="out" result="escaped"/>
      <feFlood flood-color="#FF7A33" flood-opacity="0.9"/>
      <feComposite in2="escaped" operator="in"/>
    </filter>

    <!-- The chip's silhouette clips everything: the glow stays on the film. -->
    <clipPath id="strip">
      <rect x="64" y="214" width="896" height="596" rx="26"/>
    </clipPath>
  </defs>

  <g clip-path="url(#strip)">
    <!-- film chip -->
    <rect x="64" y="214" width="896" height="596" rx="26" fill="#0B1220"/>

    <!-- halation bloom, kept on the chip around the window -->
    <rect x="120" y="300" width="784" height="424" rx="12" filter="url(#halation)"/>

    <!-- exposed window, near the chip edges -->
    <rect x="120" y="300" width="784" height="424" rx="12" fill="url(#goldFrame)"/>

    <!-- perforations -->
    <g fill="#EEF4FA">
      <rect x="120.0"   y="244" width="52" height="40" rx="10"/>
      <rect x="224.571" y="244" width="52" height="40" rx="10"/>
      <rect x="329.143" y="244" width="52" height="40" rx="10"/>
      <rect x="433.714" y="244" width="52" height="40" rx="10"/>
      <rect x="538.286" y="244" width="52" height="40" rx="10"/>
      <rect x="642.857" y="244" width="52" height="40" rx="10"/>
      <rect x="747.429" y="244" width="52" height="40" rx="10"/>
      <rect x="852.0"   y="244" width="52" height="40" rx="10"/>

      <rect x="120.0"   y="726" width="52" height="40" rx="10"/>
      <rect x="224.571" y="726" width="52" height="40" rx="10"/>
      <rect x="329.143" y="726" width="52" height="40" rx="10"/>
      <rect x="433.714" y="726" width="52" height="40" rx="10"/>
      <rect x="538.286" y="726" width="52" height="40" rx="10"/>
      <rect x="642.857" y="726" width="52" height="40" rx="10"/>
      <rect x="747.429" y="726" width="52" height="40" rx="10"/>
      <rect x="852.0"   y="726" width="52" height="40" rx="10"/>
    </g>
  </g>
</svg>
